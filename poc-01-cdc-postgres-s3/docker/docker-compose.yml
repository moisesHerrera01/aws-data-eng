version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: postgres-cdc
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpassword
      POSTGRES_DB: salesdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=5"
      - "-c"
      - "max_wal_senders=5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pguser -d salesdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
