AWSTemplateFormatVersion: "2010-09-09"
Description: >
  POC 03 - Distributed Spark Processing with EMR Serverless
  Medallion Architecture: Bronze -> Silver -> Gold on S3

Resources:

  # -------------------------------------------------------
  # S3 Data Lake — Bronze / Silver / Gold / Scripts / Logs
  # -------------------------------------------------------
  DataLakeBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "poc03-datalake-${AWS::AccountId}"
      Tags:
        - Key: Project
          Value: aws-data-eng
        - Key: POC
          Value: poc-03-emr-spark

  # -------------------------------------------------------
  # IAM Role — EMR Serverless execution
  # -------------------------------------------------------
  EmrServerlessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: poc03-emr-serverless-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: emr-serverless.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EmrServerlessS3AndLogsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DataLakeBucket.Arn
                  - !Sub "${DataLakeBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: "*"

  # -------------------------------------------------------
  # EMR Serverless Application (Spark 3.5)
  # Auto-stop after 1 min idle — costo minimo
  # -------------------------------------------------------
  EmrServerlessApp:
    Type: AWS::EMRServerless::Application
    Properties:
      Name: poc03-spark-app
      Type: SPARK
      ReleaseLabel: emr-7.0.0
      AutoStopConfiguration:
        Enabled: true
        IdleTimeoutMinutes: 1
      MaximumCapacity:
        Cpu: "4 vCPU"
        Memory: "8 GB"
      Tags:
        - Key: Project
          Value: aws-data-eng
        - Key: POC
          Value: poc-03-emr-spark

Outputs:
  BucketName:
    Description: Data lake S3 bucket
    Value: !Ref DataLakeBucket

  EmrAppId:
    Description: EMR Serverless Application ID
    Value: !Ref EmrServerlessApp

  EmrRoleArn:
    Description: EMR Serverless execution role ARN
    Value: !GetAtt EmrServerlessRole.Arn
